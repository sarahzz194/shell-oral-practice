<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>系统提示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    width:100vw;height:100vh;
    background:#ffffff;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:18px;
    color:#333333;
}
.tips{margin-bottom:32px;}
#okBtn{
    padding:12px 40px;
    font-size:16px;
    border:none;
    background:#2563eb;
    color:#fff;
    border-radius:6px;
    cursor:pointer;
}
#okBtn:hover{background:#1d4ed8;}
</style>
</head>
<body>
<div class="tips">首次注册需联系管理员审批后方可使用</div>
<button id="okBtn">我知道了</button>

<script>
// 
let base64Url = "aHR0cHM6Ly9hcHAtY2g5ZWsybXppNDF0LmFwcG1pYW9kYS5jb20=";

const btn = document.getElementById('okBtn');
btn.onclick = function(){
    // 
    let realUrl = atob(base64Url);
    // 打开无地址栏弹窗
    const w = window.open('', 'mainWin', `width=1280,height=820,location=no,toolbar=no,menubar=no,status=no,scrollbars=no`);
    // 新窗口写入全屏iframe
    w.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
    <style>
    html,body{margin:0;padding:0;height:100%;overflow:hidden}
    iframe{width:100%;height:100%;border:0;display:block}
    </style>
    </head>
    <body>
    <iframe src="${realUrl}"></iframe>
    </body>
    </html>
    `);
    w.focus();
}
</script>
</body>
</html>
